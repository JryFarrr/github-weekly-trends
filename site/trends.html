<script>
  const DATA = JSON.parse(document.getElementById("data").textContent);
  const LANG_COLORS = {
    Python: "#3572a5", TypeScript: "#3178c6", JavaScript: "#f1e05a",
    Rust: "#dea584", Go: "#00add8", "C#": "#178600", "C++": "#f34b7d",
    Java: "#b07219", Ruby: "#701516", PHP: "#4f5d95", Swift: "#f05138",
    Kotlin: "#a97bff", C: "#555555", Shell: "#89e051", HTML: "#e34c26"
  };
  const fmt = n => n.toLocaleString("id-ID");
  const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  let edIdx = 0, langFilter = "*";

  const selEl = document.getElementById("edisi");
  DATA.editions.forEach((ed, i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = ed.label;
    selEl.appendChild(o);
  });
  selEl.addEventListener("change", () => { edIdx = +selEl.value; langFilter = "*"; render(); });

  function render() {
    const ed = DATA.editions[edIdx];
    document.getElementById("hero-sub").textContent = "Edisi " + ed.label;
    document.getElementById("ringkasan").textContent = ed.summary;

    /* konteks antar-minggu: bandingkan dengan edisi sebelumnya di arsip */
    const prev = DATA.editions[edIdx + 1];
    const prevRank = prev ? Object.fromEntries(prev.repos.map((r, j) => [r.name, j])) : null;
    const streak = name => {
      let n = 1;
      for (let j = edIdx + 1; j < DATA.editions.length &&
           DATA.editions[j].repos.some(r => r.name === name); j++) n++;
      return n;
    };
    const badge = (name, i) => {
      if (!prevRank) return ""; /* edisi tertua: tak ada pembanding */
      if (!(name in prevRank)) return '<span class="badge badge-new">BARU</span>';
      const d = prevRank[name] - i;
      const arr = d > 0 ? " ▲" + d : d < 0 ? " ▼" + (-d) : "";
      return `<span class="badge">${streak(name)} mgg${arr}</span>`;
    };

    const langs = [...new Set(ed.repos.map(r => r.lang))];
    document.getElementById("filter").innerHTML =
      [`<button aria-pressed="${langFilter === "*"}" data-lang="*">Semua (${ed.repos.length})</button>`]
        .concat(langs.map(l => {
          const n = ed.repos.filter(r => r.lang === l).length;
          return `<button aria-pressed="${langFilter === l}" data-lang="${esc(l)}">${esc(l)} (${n})</button>`;
        })).join("");

    document.getElementById("cards").innerHTML = ed.repos
      .map((r, i) => ({ r, i }))
      .filter(({ r }) => langFilter === "*" || r.lang === langFilter)
      .map(({ r, i }) => {
        const [owner, repo] = r.name.split("/");
        const dot = LANG_COLORS[r.lang] || "var(--muted)";
        return `<details class="card">
          <summary>
            <span class="rank">#${i + 1}</span>
            <span class="repo"><span class="owner">${esc(owner)}/</span>${esc(repo)}</span>
            <span class="lang"><span class="dot" style="background:${dot}"></span>${esc(r.lang)}</span>
            ${badge(r.name, i)}
            <span class="stars">+${fmt(r.stars_week)} ★ minggu ini</span>
          </summary>
          <div class="body">
            <p class="desc">${esc(r.desc)}</p>
            <div class="blok"><h3>Apa ini</h3><p>${esc(r.apa)}</p></div>
            <div class="blok"><h3>Use case</h3><p>${esc(r.use_case)}</p></div>
            <div class="blok"><h3>Kenapa viral</h3><p>${esc(r.kenapa_viral)}</p></div>
            <div class="meta">
              <span>★ total ${fmt(r.stars_total)}</span>
              <a href="${esc(r.url)}" target="_blank" rel="noopener">Buka repo ↗</a>
            </div>
          </div>
        </details>`;
      }).join("");
  }

  document.getElementById("filter").addEventListener("click", e => {
    const b = e.target.closest("button");
    if (!b) return;
    langFilter = b.dataset.lang;
    render();
  });

  render();

  /* ---------- Contribution-graph hidup ---------- */
  const cv = document.getElementById("graph"), ctx = cv.getContext("2d");
  const RAMP = ["#0e4429", "#006d32", "#26a641", "#39d353"];
  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const CELL = 15; /* 12px kotak + 3px celah */
  let cells = [], stars = [], W = 0, H = 0, running = true, last = 0;

  function resize() {
    const dpr = devicePixelRatio || 1, r = cv.parentElement.getBoundingClientRect();
    W = r.width; H = r.height;
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cells = [];
    for (let y = 0; y < H / CELL; y++)
      for (let x = 0; x < W / CELL; x++)
        cells.push({ x, y, base: Math.random() });
  }

  function draw(t) {
    if (!reduced) {
      if (!running) return;
      if (t - last < 33) { requestAnimationFrame(draw); return; } /* ~30fps cukup */
      last = t;
    }
    ctx.clearRect(0, 0, W, H);
    for (const c of cells) {
      const wave = reduced ? 0.4 : 0.5 + 0.5 * Math.sin(t / 4000 + c.x * 0.25 + c.y * 0.18 + c.base * 3);
      const v = c.base * 0.45 + wave * 0.55;
      if (v < 0.35) continue;
      ctx.globalAlpha = 0.06 + (v - 0.35) * 0.5;
      ctx.fillStyle = RAMP[Math.min(3, ((v - 0.35) / 0.1625) | 0)];
      ctx.fillRect(c.x * CELL, c.y * CELL, CELL - 3, CELL - 3);
    }
    ctx.globalAlpha = 1;
    if (reduced) return;

    if (stars.length < 12 && Math.random() < 0.02)
      stars.push({ x: 20 + Math.random() * (W - 40), y: H + 10, s: 8 + Math.random() * 8, v: 0.25 + Math.random() * 0.4, p: Math.random() * 6 });
    ctx.fillStyle = "#d29922";
    ctx.textAlign = "center";
    stars = stars.filter(st => st.y > -20);
    for (const st of stars) {
      st.y -= st.v; st.p += 0.01;
      const rise = Math.min(0.7, (H - st.y) / H);
      const top = Math.min(1, Math.max(0, st.y / 100));
      ctx.globalAlpha = Math.max(0, rise * top * (0.55 + 0.35 * Math.sin(st.p * 4)));
      ctx.font = st.s + "px " + '"SF Mono", ui-monospace, monospace';
      ctx.fillText("★", st.x + Math.sin(st.p) * 8, st.y);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }

  /* hemat CPU: berhenti menggambar saat hero tak terlihat */
  new IntersectionObserver(([e]) => {
    const was = running;
    running = e.isIntersecting;
    if (!reduced && running && !was) requestAnimationFrame(draw);
  }).observe(cv);

  addEventListener("resize", () => { resize(); if (reduced) draw(0); });
  resize();
  reduced ? draw(0) : requestAnimationFrame(draw);
</script>
